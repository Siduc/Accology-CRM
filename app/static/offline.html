<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Offline · Accologise CRM</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(1.5rem, env(safe-area-inset-top)) 1.25rem max(1.5rem, env(safe-area-inset-bottom));
    }
    .card {
      text-align: center;
      max-width: 22rem;
    }
    .mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 4rem;
      height: 4rem;
      border-radius: 1rem;
      background: linear-gradient(145deg, #38bdf8 0%, #2563eb 55%, #1d4ed8 100%);
      font-weight: 900;
      font-size: 1.75rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.45);
    }
    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0 0 1.25rem;
      color: #94a3b8;
      line-height: 1.45;
      font-size: 0.95rem;
    }
    button {
      appearance: none;
      border: none;
      background: #2563eb;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.85rem 1.5rem;
      border-radius: 10px;
      min-height: 48px;
      min-width: 10rem;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark" aria-hidden="true">A</div>
    <h1>You’re offline</h1>
    <p>
      Accologise needs a connection for live practice data.
      Reconnect and try again.
    </p>
    <button type="button" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
