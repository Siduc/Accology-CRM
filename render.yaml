# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo and apply the blueprint, then set AUTH_USERNAME / AUTH_PASSWORD
# and optional COMPANIES_HOUSE_API_KEY in the Render dashboard.

services:
  - type: web
    name: accountant-crm
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: accountant-crm-db
          property: connectionString
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: COMPANIES_HOUSE_API_KEY
        sync: false

databases:
  - name: accountant-crm-db
    plan: free
    databaseName: accountant_crm
    user: accountant_crm
